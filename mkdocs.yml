theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    primary: custom
  features:
    - announce.dismiss
    - navigation.instant
    - navigation.tabs
    - navigation.indexes
    - search.highlight
    - search.suggest
    - toc.follow
    - navigation.top

